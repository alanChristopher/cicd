version: 3.9;

services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on: 
      - db
    environment:
      - DATABSE_URL=postgresql://postgres:postgres@db:5432/cicd

  db:
    image: postgres:15
    restart: always
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_DB=cicd
    ports:
      - "5432:5432"