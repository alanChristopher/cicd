name: Express API CI/CD

on:
  push:
    branches: ["main"]
  pull_request: 

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cicd
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/cicd
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
           node-version: 20
           cache: npm
      - name: Run ci
        run: npm ci
      - name: Generate prisma client
        run: npx prisma generate
      - name: Migrate prisma in deployment mode
        run: npx prisma migrate deploy

 docker:
   needs: ci
   runs-on: ubuntu-latest
   permissions:
     contents: read
     packages: write

  steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Login to registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Build image
      run: npm run build -t ghcr.io/${{ github.repository }}/express-api:latest .
    - name: Push image
      run: docker push ghcr.io/${{ github.repository }}/express-api:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Simulate deploy
        run: echo "App deployed successfully!"
